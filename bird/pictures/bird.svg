<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 10 8" shape-rendering="crispEdges">
  
  <!-- body -->
  <rect x="1" y="1" width="7" height="6" fill="#FFD54A"></rect>
  <rect x="0" y="2" width="1" height="3" fill="#FFD54A"></rect>
  <rect x="8" y="2" width="1" height="3" fill="#FFD54A"></rect>
  <rect x="2" y="0" width="5" height="1" fill="#FFD54A"></rect>
  <rect x="2" y="7" width="5" height="1" fill="#FFD54A"></rect>

  <!-- outline -->
  <rect x="1" y="1" width="7" height="1" fill="#000"></rect>
  <rect x="1" y="6" width="7" height="1" fill="#000"></rect>
  <rect x="1" y="1" width="1" height="6" fill="#000"></rect>
  <rect x="7" y="1" width="1" height="6" fill="#000"></rect>
  <rect x="2" y="0" width="5" height="1" fill="#000"></rect>
  <rect x="2" y="7" width="5" height="1" fill="#000"></rect>
  <rect x="0" y="2" width="1" height="3" fill="#000"></rect>
  <rect x="8" y="2" width="1" height="3" fill="#000"></rect>

  <!-- wing -->
  <rect x="2" y="3" width="3" height="2" fill="#F4B400"></rect>
  <rect x="3" y="2" width="2" height="1" fill="#F4B400"></rect>

  <!-- beak -->
  <rect x="8" y="3" width="2" height="1" fill="#FF8C42"></rect>
  <rect x="8" y="4" width="1" height="1" fill="#FF8C42"></rect>

  <!-- eye -->
  <rect x="5" y="2" width="1" height="1" fill="#fff"></rect>
  <rect x="6" y="2" width="1" height="1" fill="#000"></rect>

  <!-- blush -->
  <rect x="4" y="4" width="2" height="1" fill="#FFB3B3"></rect>

</svg>