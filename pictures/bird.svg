<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 16 16" shape-rendering="crispEdges">
  
  <!-- body -->
  <rect x="4" y="5" width="7" height="6" fill="#FFD54A"></rect>
  <rect x="3" y="6" width="1" height="3" fill="#FFD54A"></rect>
  <rect x="11" y="6" width="1" height="3" fill="#FFD54A"></rect>
  <rect x="5" y="4" width="5" height="1" fill="#FFD54A"></rect>
  <rect x="5" y="11" width="5" height="1" fill="#FFD54A"></rect>

  <!-- outline -->
  <rect x="4" y="5" width="7" height="1" fill="#000"></rect>
  <rect x="4" y="10" width="7" height="1" fill="#000"></rect>
  <rect x="4" y="5" width="1" height="6" fill="#000"></rect>
  <rect x="10" y="5" width="1" height="6" fill="#000"></rect>
  <rect x="5" y="4" width="5" height="1" fill="#000"></rect>
  <rect x="5" y="11" width="5" height="1" fill="#000"></rect>
  <rect x="3" y="6" width="1" height="3" fill="#000"></rect>
  <rect x="11" y="6" width="1" height="3" fill="#000"></rect>

  <!-- wing -->
  <rect x="5" y="7" width="3" height="2" fill="#F4B400"></rect>
  <rect x="6" y="6" width="2" height="1" fill="#F4B400"></rect>

  <!-- beak -->
  <rect x="11" y="7" width="2" height="1" fill="#FF8C42"></rect>
  <rect x="11" y="8" width="1" height="1" fill="#FF8C42"></rect>

  <!-- eye -->
  <rect x="8" y="6" width="1" height="1" fill="#fff"></rect>
  <rect x="9" y="6" width="1" height="1" fill="#000"></rect>

  <!-- blush -->
  <rect x="7" y="8" width="2" height="1" fill="#FFB3B3"></rect>

</svg>